<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no"/>
  <meta name="theme-color" content="#0a0400"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
  <meta name="apple-mobile-web-app-title" content="Mi Cava"/>
  <meta name="mobile-web-app-capable" content="yes"/>
  <title>Mi Cava 🍷</title>
  <link rel="manifest" href="manifest.json"/>
  <link rel="apple-touch-icon" href="icons/icon-192.png"/>
  <link rel="icon" type="image/png" sizes="192x192" href="icons/icon-192.png"/>
  <style>
    *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
    html,body,#root{height:100%;min-height:100dvh;background:#0a0400;overscroll-behavior:none}
    body{-webkit-font-smoothing:antialiased;overscroll-behavior-y:contain}
    ::-webkit-scrollbar{width:6px;height:6px}
    ::-webkit-scrollbar-track{background:#1a0800}
    ::-webkit-scrollbar-thumb{background:#4a2800;border-radius:3px}
    #splash{position:fixed;inset:0;z-index:9999;
      background:radial-gradient(ellipse at 30% 20%,#1a0800,#0a0400 60%,#000);
      display:flex;flex-direction:column;align-items:center;justify-content:center;
      color:#d4a853;font-family:'Helvetica Neue',Helvetica,Arial,sans-serif;
      transition:opacity 0.4s}
    #splash.hidden{opacity:0;pointer-events:none}
    #splash-wine{font-size:64px;animation:pulse 1.5s ease-in-out infinite}
    #splash-title{font-size:28px;letter-spacing:6px;font-weight:300;margin-top:16px}
    #splash-sub{font-size:11px;letter-spacing:3px;color:#6a4020;margin-top:8px}
    @keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.08)}}
    #install-banner{position:fixed;bottom:0;left:0;right:0;
      background:linear-gradient(135deg,#1a0800,#2c1400);border-top:1px solid #6b3a1f;
      padding:14px 20px;display:flex;align-items:center;gap:12px;z-index:500;
      font-family:'Helvetica Neue',Helvetica,Arial,sans-serif;
      transform:translateY(100%);transition:transform 0.3s ease}
    #install-banner.visible{transform:translateY(0)}
    #install-banner span{flex:1;font-size:13px;color:#c8a880}
    #btn-install{background:linear-gradient(135deg,#7B1D1D,#a83232);border:none;border-radius:8px;
      padding:9px 18px;color:#fff;cursor:pointer;font-size:13px;font-family:inherit;white-space:nowrap}
    #btn-dismiss{background:transparent;border:none;color:#6a4020;cursor:pointer;font-size:20px;padding:4px 8px}
  </style>
</head>
<body>
  <div id="splash">
    <div id="splash-wine">🍷</div>
    <div id="splash-title">MI CAVA</div>
    <div id="splash-sub">CARGANDO…</div>
  </div>
  <div id="install-banner">
    <span>🍷 Instala Mi Cava en tu pantalla de inicio</span>
    <button id="btn-install">Instalar</button>
    <button id="btn-dismiss">✕</button>
  </div>
  <div id="root"></div>

  <!-- React -->
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>

  <!-- Firebase SDK (modular compat) -->
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>

  <!-- Bridge: expose Firebase modular-style API to app.js -->
  <script>
    // app.js uses the modular API style; this bridges the compat SDK
    window.firebaseApp = {
      initializeApp: (cfg) => firebase.initializeApp(cfg),
      getApps: () => firebase.apps,
    };
    window.firebaseAuth = {
      getAuth: (app) => app.auth(),
      onAuthStateChanged: (auth, cb) => auth.onAuthStateChanged(cb),
      signInWithEmailAndPassword: (auth, e, p) => auth.signInWithEmailAndPassword(e, p),
      createUserWithEmailAndPassword: (auth, e, p) => auth.createUserWithEmailAndPassword(e, p),
      signOut: (auth) => auth.signOut(),
      updateProfile: (user, data) => user.updateProfile(data),
    };
    window.firebaseFirestore = {
      getFirestore: (app) => app.firestore(),
      doc: (db, col, id) => db.collection(col).doc(id),
      getDoc: (ref) => ref.get(),
      setDoc: (ref, data) => ref.set(data),
      onSnapshot: (ref, cb, errCb) => ref.onSnapshot(cb, errCb),
    };
  </script>

  <!-- Babel -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <!-- App -->
  <script type="text/babel" src="app.js"></script>

  <script>
    (function waitForApp() {
      if (typeof CavaApp !== "undefined") {
        ReactDOM.createRoot(document.getElementById("root"))
          .render(React.createElement(CavaApp));
        const s = document.getElementById("splash");
        s.classList.add("hidden");
        setTimeout(()=>{ if(s.parentNode) s.parentNode.removeChild(s); }, 500);
      } else {
        setTimeout(waitForApp, 50);
      }
    })();

    if ("serviceWorker" in navigator) {
      window.addEventListener("load", ()=>{
        navigator.serviceWorker.register("sw.js").catch(e=>console.warn("SW:",e));
      });
    }

    let deferredPrompt = null;
    const banner = document.getElementById("install-banner");
    window.addEventListener("beforeinstallprompt", e=>{
      e.preventDefault(); deferredPrompt = e;
      if (!localStorage.getItem("pwa-dismissed")) banner.classList.add("visible");
    });
    document.getElementById("btn-install").addEventListener("click", async ()=>{
      if (!deferredPrompt) return;
      banner.classList.remove("visible");
      deferredPrompt.prompt(); deferredPrompt = null;
    });
    document.getElementById("btn-dismiss").addEventListener("click", ()=>{
      banner.classList.remove("visible");
      localStorage.setItem("pwa-dismissed","1");
    });
    window.addEventListener("appinstalled", ()=>{ banner.classList.remove("visible"); });
  </script>
</body>
</html>
